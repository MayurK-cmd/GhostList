name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install root dependencies
        run: npm install

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: compact compile
        continue-on-error: true
        run: |
          echo "Attempting contract compilation via Docker..."
          docker run --rm \
            -v "$(pwd):/workspace" -w /workspace \
            ghcr.io/midnight-ntwrk/compactc:v0.31.1 \
            compactc contracts/allowlist_stub.compact contracts/managed/allowlist_stub 2>&1 || \
          echo "⚠️ Compile step optional — managed artifacts already committed; tests proceed with cached output."

      - name: Run test suite
        run: npm test
